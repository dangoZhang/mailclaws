name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      pages_supported: ${{ steps.pages-state.outputs.pages_supported }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Resolve Pages support
        id: pages-state
        shell: bash
        run: |
          if [ "${{ steps.pages.outcome }}" = "success" ]; then
            echo "pages_supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "pages_supported=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled for this repository plan. Skipping deploy." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        env:
          MAILCLAW_DOCS_BASE: /mailclaw/
        run: pnpm docs:build

      - name: Upload Pages artifact
        if: steps.pages-state.outputs.pages_supported == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Upload docs preview artifact
        if: steps.pages-state.outputs.pages_supported != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-preview
          path: docs/.vitepress/dist

  deploy:
    needs: build
    if: needs.build.outputs.pages_supported == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
