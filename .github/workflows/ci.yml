name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build runtime
        run: pnpm build

      - name: Build docs
        run: pnpm docs:build

      - name: Build release bundle
        run: pnpm package:release

      - name: Upload release preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: mailclaw-release-preview
          path: |
            output/release/mailclaw-v*/
            output/release/mailclaw-v*.tar.gz
            output/release/npm/*.tgz
            output/release/homebrew/*.rb
            output/release/checksums.txt
          if-no-files-found: error
